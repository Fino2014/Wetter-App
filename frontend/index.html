<!<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WetterWise - Deine Wetter App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <h1>WetterWise 🌤️</h1>
        <p>Hier entsteht eure KI-gestützte Wetter-App.</p>
        
        <div class="search-box">
            <input type="text" id="stadt-input" placeholder="Stadt eingeben (z.B. Bochum)">
            <button id="wetter-btn">Suchen</button>
        </div>

        <div class="profile-box">
            <h3>Mein Profil & Empfindlichkeiten:</h3>
            <label>
                <input type="checkbox" id="check-kaelte"> 🥶 Ich bin kälteempfindlich
            </label>
            <label>
                <input type="checkbox" id="check-hitze"> 🥵 Ich bin hitzeempfindlich
            </label>
            <label>
                <input type="checkbox" id="check-pollen"> 🤧 Ich habe eine Pollenallergie
            </label>
        </div>

        <div id="wetter-output" class="output-box">
            </div>

        <div id="empfehlung-output" class="recommendation-box">
            </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
